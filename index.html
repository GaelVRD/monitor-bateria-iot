<!DOCTYPE html>
<html>
<head>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Monitor batería IoT - Equipo 03</title>

<style>

body{
font-family: Arial;
background:#111;
color:white;
text-align:center;
}

.card{
background:#222;
padding:20px;
margin:20px;
border-radius:10px;
}

.valor{
font-size:35px;
}

canvas{
max-width:800px;
margin:auto;
}

</style>

</head>

<body>

<h1>Monitor batería IoT</h1>
<h3>Equipo 03</h3>

<div class="card">
Voltaje
<div id="v" class="valor">--</div>
</div>

<div class="card">
Corriente
<div id="i" class="valor">--</div>
</div>

<div class="card">
Potencia
<div id="p" class="valor">--</div>
</div>

<h2>Gráfica de voltaje</h2>

<canvas id="graficaVoltaje"></canvas>
<script>

const url = "https://script.google.com/macros/s/AKfycbys1Zo3A7-hmdTwhwQ7viXDcNG_KiysLZol4BOyb-2SbS_09IGwRAEnM5Pl-EIhcaIPqQ/exec";

const ctx = document.getElementById("graficaVoltaje");

const grafica = new Chart(ctx, {
  type: "line",
  data: {
    labels: [],
    datasets: [{
      label: "Voltaje batería (V)",
      data: [],
      borderColor: "lime",
      borderWidth: 2,
      tension: 0.2
    }]
  },
  options: {
    scales: {
      y: {
        beginAtZero: false
      }
    }
  }
});


async function actualizar() {

  let r = await fetch(url);
  let d = await r.json();

  // mostrar valores actuales
  document.getElementById("v").innerText = d.voltaje + " V";
  document.getElementById("i").innerText = d.corriente + " A";
  document.getElementById("p").innerText = d.potencia + " W";

  // agregar punto a la gráfica
  let tiempo = new Date().toLocaleTimeString();

  grafica.data.labels.push(tiempo);
  grafica.data.datasets[0].data.push(d.voltaje);

  // mantener máximo 20 valores
  if (grafica.data.labels.length > 20) {
    grafica.data.labels.shift();
    grafica.data.datasets[0].data.shift();
  }

  grafica.update();
}


// actualizar cada minuto
setInterval(actualizar, 60000);

// primera lectura al cargar la página
actualizar();

</script>
</body>
</html>
