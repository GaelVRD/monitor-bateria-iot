<!DOCTYPE html>
<html>
<head>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Monitor batería IoT - Equipo 03</title>

<style>

body{
font-family: Arial;
background:#111;
color:white;
text-align:center;
}

.card{
background:#222;
padding:20px;
margin:20px;
border-radius:10px;
}

.valor{
font-size:35px;
}

canvas{
max-width:800px;
margin:auto;
}

</style>

</head>

<body>

<h1>Monitor batería IoT</h1>
<h3>Equipo 03</h3>

<div class="card">
Voltaje
<div id="v" class="valor">--</div>
</div>

<div class="card">
Corriente
<div id="i" class="valor">--</div>
</div>

<div class="card">
Potencia
<div id="p" class="valor">--</div>
</div>

<h2>Gráfica de voltaje</h2>

<canvas id="graficaVoltaje"></canvas>

<script>

const url="https://script.google.com/macros/s/AKfycbys1Zo3A7-hmdTwhwQ7viXDcNG_KiysLZol4BOyb-2SbS_09IGwRAEnM5Pl-EIhcaIPqQ/exec";

const ctx = document.getElementById("graficaVoltaje");

const grafica = new Chart(ctx, {
type: "line",
data: {
labels: [],
datasets: [{
label: "Voltaje batería (V)",
data: [],
borderColor: "lime",
borderWidth: 2,
tension: 0.2
}]
},
options: {
scales: {
y: {
beginAtZero: false
}
}
}
});

async function actualizar(){

let r = await fetch(url);
let datos = await r.json();

// limpiar gráfica
grafica.data.labels=[];
grafica.data.datasets[0].data=[];

// recorrer últimos registros
for(let i=0;i<datos.length;i++){

let tiempo = new Date(datos[i].tiempo).toLocaleTimeString();

grafica.data.labels.push(tiempo);
grafica.data.datasets[0].data.push(datos[i].voltaje);

}

// mostrar último valor en dashboard
let ultimo = datos[datos.length-1];

document.getElementById("v").innerText=ultimo.voltaje+" V";
document.getElementById("i").innerText=ultimo.corriente+" A";
document.getElementById("p").innerText=ultimo.potencia+" W";

grafica.update();

}

setInterval(actualizar,60000);

actualizar();

</script>

</body>
</html>
