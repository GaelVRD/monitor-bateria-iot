<!DOCTYPE html>
<html>
<head>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Sistema IoT de Monitoreo de Batería - Equipo 03</title>

<style>

body{

font-family: Arial;
background:
linear-gradient(
to bottom,
#5c1730,
#7a2142,
#8f2d50
);
color:white;
text-align:center;
margin:0;
padding:20px;
}


/* ========================= */
/* Contenedor */
/* ========================= */

.contenedor{

display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
}


/* ========================= */
/* Tarjetas */
/* ========================= */

.card{

background:rgba(20,20,20,0.75);
padding:25px;
border-radius:15px;
backdrop-filter: blur(5px);
border:1px solid rgba(255,255,255,0.15);
width:250px;

box-shadow:
0 0 10px rgba(0,0,0,0.5);

transition:0.3s;
}


.card:hover{

transform:translateY(-5px);

box-shadow:
0 0 15px rgba(255,255,255,0.12)
}


/* ========================= */
/* Valores */
/* ========================= */

.valor{

font-size:40px;
font-weight:bold;
margin-top:10px;
}


/* ========================= */
/* Canvas */
/* ========================= */

canvas{

max-width:900px;
margin:auto;
margin-top:20px;
}


/* ========================= */
/* LEDs */
/* ========================= */

.led{

width:25px;
height:25px;
border-radius:50%;
display:inline-block;
margin-right:10px;
}


/* Verde */

.verde{

background:lime;

box-shadow:
0 0 15px lime;
}


/* Rojo */

.rojo{

background:red;

box-shadow:
0 0 15px red;
}


/* Encendido */

.encendido{

opacity:1;
}


/* Apagado */

.apagado{

opacity:0.2;

box-shadow:none;
}


/* ========================= */
/* Botones */
/* ========================= */

button{

padding:12px 20px;
margin:5px;
font-size:15px;

border:none;
border-radius:10px;

cursor:pointer;

background:#333;
color:white;

transition:0.3s;
}


button:hover{

background:lime;
color:black;
}


/* ========================= */
/* Input */
/* ========================= */

input{

padding:10px;
font-size:15px;

border-radius:8px;
border:none;
}


/* ========================= */
/* Títulos */
/* ========================= */

h1{

font-size:40px;
margin-bottom:5px;
}


h3{

color:#aaa;
margin-top:0;
}


h2{

margin-top:10px;
}


/* ========================= */
/* Secciones desplegables */
/* ========================= */

details{

background:#222;
padding:15px;
margin:20px;
border-radius:15px;
}


summary{

font-size:18px;
font-weight:bold;
cursor:pointer;
list-style:none;
}


summary:hover{

color:#f5f5f5;
}


/* ========================= */
/* Selector */
/* ========================= */

select{

padding:10px;
font-size:16px;
border-radius:8px;
border:none;
}


/* ========================= */
/* Flecha desplegable */
/* ========================= */

summary::after{

content:"▼";

color:#ddd;

font-size:16px;

float:right;

transition:0.3s;
}


/* Girar flecha al abrir */

details[open] summary::after{

transform:rotate(180deg);
}

/* ========================= */
/* Monitor gráfica */
/* ========================= */

.monitor{

background:#0f0f0f;

padding:20px;

border-radius:20px;

margin:auto;

max-width:950px;

border:3px solid rgba(255,255,255,0.08);

box-shadow:

0 0 25px rgba(0,0,0,0.45),

0 0 10px rgba(255,255,255,0.05);

}


/* Canvas */

.monitor canvas{

width:100% !important;
height:auto !important;
}

/* ========================= */
/* Encabezado IPN */
/* ========================= */

.headerIPN{

text-align:center;

margin-bottom:30px;
}


/* Contenedor logos */

.logosIPN{

display:flex;

justify-content:center;

align-items:center;

gap:30px;

margin-bottom:15px;
}


/* Logos */

.logo{

width:85px;

height:auto;

object-fit:contain;
}


/* Título */

.tituloIPN{

margin:0;

font-size:26px;

font-weight:bold;
}


/* Subtítulo */

.subtituloIPN{

margin-top:8px;

font-weight:normal;

color:rgba(255,255,255,0.8);
}

/* Texto central */

.tituloIPN{

margin:0;

font-size:28px;

font-weight:bold;
}


.subtituloIPN{

margin-top:5px;

font-weight:normal;

color:rgba(255,255,255,0.8);
}

</style>

</head>

<body>

<!-- ========================= -->
<!-- ENCABEZADO IPN -->
<!-- ========================= -->

<div class="headerIPN">


<div class="logosIPN">

<img
src="logo-ipn.png"
class="logo">

<img
src="logo-esime.png"
class="logo">

</div>


<h2 class="tituloIPN">
Instituto Politécnico Nacional
</h2>


<h3 class="subtituloIPN">
ESIME Unidad Zacatenco
</h3>

</div>

<h1>Sistema IoT de Monitoreo de Batería</h1>
<h3>Equipo 03</h3>



<!-- ========================= -->
<!-- SECCIÓN MONITOREO -->
<!-- ========================= -->

<details>

<summary>
Monitoreo en tiempo real
</summary>

<div class="contenedor">


<!-- Voltaje -->

<div class="card">

Voltaje

<div id="v" class="valor">
--
</div>

</div>



<!-- Corriente -->

<div class="card">

Corriente

<div id="i" class="valor">
--
</div>

</div>



<!-- Potencia -->

<div class="card">

Potencia

<div id="p" class="valor">
--
</div>

</div>

</div>

</details>




<!-- ========================= -->
<!-- SECCIÓN CONTROL -->
<!-- ========================= -->

<details>

<summary>
Control del sistema
</summary>

<div class="contenedor">


<!-- Estado -->

<div class="card">

<h2>Estado del sistema</h2>

<div id="ledVerde"
class="led verde apagado">
</div>

Funcionando

<br><br>

<div id="ledRojo"
class="led rojo encendido">
</div>

Detenido

</div>



<!-- Controles -->

<div class="card">

<h2>Control</h2>

<button onclick="iniciarSistema()">
INICIO
</button>

<button onclick="paroEmergencia()">
PARO DE EMERGENCIA
</button>

<br><br>

<input type="time" id="horaParo">

<button onclick="programarParo()">
PARO POR HORARIO
</button>

</div>

</div>

</details>



<!-- ========================= -->
<!-- GRÁFICAS -->
<!-- ========================= -->

<h2>Gráficas</h2>

<select id="selectorGrafica"
onchange="cambiarGrafica()">

<option value="voltaje">
Voltaje
</option>

<option value="corriente">
Corriente
</option>

<option value="potencia">
Potencia
</option>

<option value="todas">
Todas
</option>

</select>

<br><br>

<div class="monitor">

<canvas id="graficaVoltaje"></canvas>

</div>


<script>

/* URL Apps Script */
const url =
"https://script.google.com/macros/s/AKfycbzfYWog5iYIqtO90_0wOA1-_0WS0sOz0W6GLJ5GADJ23oyJIRQHUyreH_G4iP-ptRTh7w/exec";

/* Historial temporal */

let historialCorriente = [];

let historialPotencia = [];
  
/* Canvas */
const ctx =
document.getElementById("graficaVoltaje");


/* Crear gráfica */
const grafica = new Chart(ctx, {

type:"line",

data:{

labels: [],

datasets:[

{

label:"Voltaje (V)",

data: [],

borderColor:"lime",

backgroundColor:"lime",

pointBackgroundColor:"lime",

pointBorderColor:"lime",

borderWidth:2,

tension:0.2
},

{

label:"Corriente (A)",

data:historialCorriente,

borderColor:"cyan",

backgroundColor:"cyan",

borderWidth:2,

tension:0.2,

hidden:true
},

{

label:"Potencia (W)",

data:historialPotencia,

borderColor:"yellow",

backgroundColor:"yellow",

borderWidth:2,

tension:0.2,

hidden:true
}

]

},

options:{

plugins:{

legend:{

labels:{

color:"white",

usePointStyle:true,

pointStyle:"circle",

boxWidth:8,

boxHeight:8,

padding:20
}
}

},

scales:{

x:{

ticks:{
color:"white"
},

grid:{
color:"rgba(255,255,255,0.1)"
}
},

y:{

ticks:{
color:"white"
},

grid:{
color:"rgba(255,255,255,0.1)"
},

beginAtZero:false
}
}

}

});

/* ========================= */
/* Estado sistema */
/* ========================= */

let sistemaActivo = false;


/* ========================= */
/* Actualizar */
/* ========================= */

async function actualizar(){

let r = await fetch(url);

let respuesta = await r.json();

let d = respuesta.datos;


/* Verificar datos */
if(d.length === 0){

return;
}


/* Limpiar gráfica */

grafica.data.labels = [];

grafica.data.datasets[0].data = [];

grafica.data.datasets[1].data = [];

grafica.data.datasets[2].data = [];


/* Recorrer datos */

for(let j = 0; j < d.length; j++){

let dato = d[j];
  
console.log(dato);

/* Mostrar últimos valores */

if(j === d.length - 1){

document.getElementById("v").innerText =
dato.voltaje + " V";

document.getElementById("i").innerText =
dato.corriente + " A";

document.getElementById("p").innerText =
dato.potencia + " W";
}


/* Tiempo */

let tiempo =
new Date(dato.tiempo)
.toLocaleTimeString();


/* Agregar datos */

grafica.data.labels.push(tiempo);

grafica.data.datasets[0].data.push(
dato.voltaje
);

grafica.data.datasets[1].data.push(
dato.corriente
);

grafica.data.datasets[2].data.push(
dato.potencia
);

}


/* Máximo 20 puntos */

if(grafica.data.labels.length > 20){

grafica.data.labels.shift();

grafica.data.datasets[0].data.shift();

grafica.data.datasets[1].data.shift();

grafica.data.datasets[2].data.shift();

}


/* Actualizar gráfica */

grafica.update();
}

/* ========================= */
/* INICIO */
/* ========================= */

function iniciarSistema(){

sistemaActivo = true;

document.getElementById("ledVerde")
.classList.remove("apagado");

document.getElementById("ledVerde")
.classList.add("encendido");

document.getElementById("ledRojo")
.classList.remove("encendido");

document.getElementById("ledRojo")
.classList.add("apagado");
}


/* ========================= */
/* PARO */
/* ========================= */

function paroEmergencia(){

sistemaActivo = false;

document.getElementById("ledRojo")
.classList.remove("apagado");

document.getElementById("ledRojo")
.classList.add("encendido");

document.getElementById("ledVerde")
.classList.remove("encendido");

document.getElementById("ledVerde")
.classList.add("apagado");
}


/* ========================= */
/* PARO PROGRAMADO */
/* ========================= */

function programarParo(){

let hora =
document.getElementById("horaParo").value;


if(!hora){

alert("Seleccione una hora");

return;
}


let ahora = new Date();

let partes = hora.split(":");

let horaParo = new Date();

horaParo.setHours(partes[0]);

horaParo.setMinutes(partes[1]);

horaParo.setSeconds(0);


/* Validar */

if(horaParo <= ahora){

alert("Hora inválida");

return;
}


let tiempoRestante =
horaParo.getTime() - ahora.getTime();


setTimeout(() => {

paroEmergencia();

alert(
"Sistema detenido por horario programado"
);

}, tiempoRestante);


alert(
"Paro programado correctamente"
);

}


/* ========================= */
/* Selector gráfica */
/* ========================= */

function cambiarGrafica(){

let opcion =
document.getElementById(
"selectorGrafica"
).value;


/* Mostrar/Ocultar datasets */

grafica.data.datasets[0].hidden =
(opcion !== "voltaje" &&
 opcion !== "todas");

grafica.data.datasets[1].hidden =
(opcion !== "corriente" &&
 opcion !== "todas");

grafica.data.datasets[2].hidden =
(opcion !== "potencia" &&
 opcion !== "todas");


/* Actualizar */

grafica.update();
}

/* Primera lectura */

actualizar();

/* Aplicar selector al iniciar */

cambiarGrafica();


/* Actualizar cada minuto */

setInterval(actualizar, 60000);

</script>

</body>
</html>
